name: Build & Deploy via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  # ============================================================
  # Job 1: Build image và push lên Docker Hub
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Backend ---
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back_end
          file: ./back_end/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/danhgianhanvien-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/danhgianhanvien-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Frontend ---
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_end
          file: ./front_end/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/danhgianhanvien-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/danhgianhanvien-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 2: SSH vào VPS, pull image mới và restart
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: DOCKERHUB_USERNAME
          script: |
            cd /root/tonghanh/webapp/danhgianhanvien

            # Lấy file docker-compose mới nhất
            git pull origin main

            # Pull image mới từ Docker Hub
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend

            # Restart containers với image mới (không build lại)
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Dọn dẹp image cũ không dùng
            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
